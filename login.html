<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEEP LOGIN</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


  
  :root {
    --cyan: #00f5d4;
    --blue: #0a1628;
    --mid: #0d2137;
    --glow: #00c9ff;
    --warn: #ff6b6b;
    --text: #a8d8ea;
    --dim: #2a4a6b;
  }

  body {
    background: var(--blue);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    cursor: crosshair;
  }

  /* Underwater animated background */
  .ocean {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 100%, #0a2a4a 0%, #050e1a 70%);
    z-index: 0;
  }

  .bubbles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .bubble {
    position: absolute;
    bottom: -20px;
    border-radius: 50%;
    border: 1px solid rgba(0, 245, 212, 0.3);
    background: rgba(0, 245, 212, 0.04);
    animation: rise linear infinite;
  }

  @keyframes rise {
    0%   { transform: translateX(0) translateY(0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.5; }
    100% { transform: translateX(var(--drift)) translateY(-110vh) scale(1.2); opacity: 0; }
  }

  /* Sonar rings */
  .sonar {
    position: fixed;
    bottom: 10%;
    right: 8%;
    z-index: 1;
    pointer-events: none;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0, 245, 212, 0.4);
    transform: translate(-50%, -50%);
    animation: sonar-pulse 4s ease-out infinite;
  }

  .ring:nth-child(2) { animation-delay: 1.3s; }
  .ring:nth-child(3) { animation-delay: 2.6s; }

  @keyframes sonar-pulse {
    0%   { width: 0; height: 0; opacity: 1; }
    100% { width: 300px; height: 300px; opacity: 0; }
  }

  /* Scanlines */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 2;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.07) 2px,
      rgba(0, 0, 0, 0.07) 4px
    );
    pointer-events: none;
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    width: 420px;
    padding: 48px 44px;
    background: rgba(10, 25, 50, 0.85);
    border: 1px solid rgba(0, 245, 212, 0.25);
    border-top: 2px solid var(--cyan);
    box-shadow:
      0 0 60px rgba(0, 245, 212, 0.08),
      0 0 120px rgba(0, 150, 200, 0.06),
      inset 0 1px 0 rgba(0, 245, 212, 0.1);
    backdrop-filter: blur(12px);
    animation: card-in 1s cubic-bezier(0.23, 1, 0.32, 1) both;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Corner accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 20px; height: 20px;
    border-bottom: 1px solid rgba(0, 245, 212, 0.4);
    border-left: 1px solid rgba(0, 245, 212, 0.4);
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 20px; height: 20px;
    border-top: 1px solid rgba(0, 245, 212, 0.4);
    border-right: 1px solid rgba(0, 245, 212, 0.4);
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .depth-label {
    font-size: 10px;
    letter-spacing: 6px;
    color: var(--glow);
    opacity: 0.6;
    margin-bottom: 8px;
    animation: blink 3s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 90%, 100% { opacity: 0.6; }
    95% { opacity: 0.2; }
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--cyan);
    text-shadow: 0 0 20px rgba(0, 245, 212, 0.6), 0 0 40px rgba(0, 245, 212, 0.3);
    line-height: 1;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text);
    opacity: 0.5;
    margin-top: 10px;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 30px;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--dim));
  }
  .divider-line:last-child {
    background: linear-gradient(90deg, var(--dim), transparent);
  }
  .divider-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 6px var(--cyan);
  }

  /* Form */
  .field {
    margin-bottom: 24px;
    position: relative;
  }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--glow);
    opacity: 0.7;
    margin-bottom: 8px;
    transition: opacity 0.3s;
  }

  .field:focus-within label {
    opacity: 1;
  }

  .input-wrap {
    position: relative;
  }

  input {
    width: 100%;
    background: rgba(0, 245, 212, 0.03);
    border: 1px solid var(--dim);
    border-bottom: 1px solid rgba(0, 245, 212, 0.4);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    padding: 12px 44px 12px 16px;
    outline: none;
    transition: all 0.3s ease;
    letter-spacing: 2px;
    caret-color: var(--cyan);
  }

  input::placeholder {
    color: var(--dim);
    letter-spacing: 1px;
  }

  input:focus {
    border-color: rgba(0, 245, 212, 0.6);
    background: rgba(0, 245, 212, 0.06);
    box-shadow: 0 4px 20px rgba(0, 245, 212, 0.08);
  }

  .input-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--dim);
    font-size: 14px;
    transition: color 0.3s;
    cursor: pointer;
    user-select: none;
  }

  .field:focus-within .input-icon {
    color: var(--cyan);
  }

  /* Progress bar */
  .strength-bar {
    height: 2px;
    margin-top: 6px;
    background: var(--dim);
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    width: 0%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    transition: width 0.4s ease, background 0.4s;
  }

  /* Button */
  .btn {
    width: 100%;
    margin-top: 32px;
    padding: 15px;
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 5px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: translateX(-101%);
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    z-index: -1;
  }

  .btn:hover {
    color: var(--blue);
    box-shadow: 0 0 30px rgba(0, 245, 212, 0.4);
  }

  .btn:hover::before { transform: translateX(0); }
  .btn:active { transform: scale(0.98); }

  .btn.loading span { animation: loading-text 1.5s infinite; }
  @keyframes loading-text {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Footer links */
  .links {
    margin-top: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .link {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text);
    opacity: 0.4;
    text-decoration: none;
    transition: opacity 0.3s, color 0.3s;
    cursor: pointer;
  }

  .link:hover {
    opacity: 1;
    color: var(--cyan);
  }

  /* Status indicator */
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text);
    opacity: 0.5;
    margin-top: 28px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4cff91;
    box-shadow: 0 0 8px #4cff91;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
  }

  /* Error message */
  .error-msg {
    color: var(--warn);
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 16px;
    text-align: center;
    min-height: 16px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .error-msg.show { opacity: 1; }

  /* Success overlay */
  .success-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--blue);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s;
  }

  .success-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .success-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    letter-spacing: 8px;
    color: var(--cyan);
    text-shadow: 0 0 30px var(--cyan);
    animation: flicker 0.5s ease-in-out 3;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .success-sub {
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text);
    opacity: 0.5;
  }

  /* Depth counter */
  .depth-counter {
    position: fixed;
    left: 32px;
    bottom: 32px;
    z-index: 10;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text);
    opacity: 0.3;
    pointer-events: none;
  }

  .depth-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--cyan);
    opacity: 0.5;
    display: block;
    text-shadow: 0 0 10px rgba(0,245,212,0.3);
  }
</style>
</head>
<body>

<div class="ocean"></div>
<div class="bubbles" id="bubbles"></div>
<div class="scanlines"></div>
<div class="sonar">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<div class="depth-counter">
  PROFUNDIDAD<br>
  <span class="depth-val" id="depth">0847</span> m
</div>

<div class="card">
  <div class="header">
    <div class="depth-label">▸ SISTEMA SEGURO ◂</div>
    <div class="title">ABISSAL</div>
    <div class="subtitle">PROTOCOLO DE ACCESO v3.7</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-dot"></div>
    <div class="divider-line"></div>
  </div>

  <div class="field">
    <label>IDENTIFICADOR</label>
    <div class="input-wrap">
      <input type="text" id="user" placeholder="usuario@dominio.mx" autocomplete="off" spellcheck="false">
      <span class="input-icon">⌘</span>
    </div>
  </div>

  <div class="field">
    <label>CLAVE DE ACCESO</label>
    <div class="input-wrap">
      <input type="password" id="pass" placeholder="••••••••••••" autocomplete="off" id="pass">
      <span class="input-icon" id="toggle-pass" title="Mostrar/ocultar">◎</span>
    </div>
    <div class="strength-bar"><div class="strength-fill" id="strength"></div></div>
  </div>

  <button class="btn" id="login-btn">
    <span id="btn-text">INICIAR SESIÓN</span>
  </button>

  <div class="error-msg" id="error-msg">⚠ CREDENCIALES NO RECONOCIDAS</div>

  <div class="links">
    <a class="link">¿OLVIDASTE TU CLAVE?</a>
    <a class="link">ACCESO INVITADO</a>
  </div>

  <div class="status">
    <div class="status-dot"></div>
    CANAL ENCRIPTADO · AES-256
  </div>
</div>

<div class="success-overlay" id="success">
  <div class="success-text">ACCESO CONCEDIDO</div>
  <div class="success-sub">BIENVENIDO A LAS PROFUNDIDADES</div>
</div>

<script>
  // Bubbles
  const bubbles = document.getElementById('bubbles');
  for (let i = 0; i < 28; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = Math.random() * 18 + 4;
    b.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      --drift: ${(Math.random() - 0.5) * 80}px;
      animation-duration: ${Math.random() * 12 + 8}s;
      animation-delay: ${Math.random() * 10}s;
    `;
    bubbles.appendChild(b);
  }

  // Depth counter
  let depthTarget = 847;
  const depthEl = document.getElementById('depth');
  setInterval(() => {
    depthTarget += Math.floor((Math.random() - 0.4) * 3);
    depthEl.textContent = String(depthTarget).padStart(4, '0');
  }, 800);

  // Password strength
  const passInput = document.getElementById('pass');
  const strength = document.getElementById('strength');
  passInput.addEventListener('input', () => {
    const v = passInput.value;
    let score = 0;
    if (v.length > 4) score += 25;
    if (v.length > 8) score += 25;
    if (/[A-Z]/.test(v)) score += 25;
    if (/[0-9!@#$%]/.test(v)) score += 25;
    strength.style.width = score + '%';
    const colors = ['#ff6b6b','#ffb347','#ffd166','#00f5d4'];
    strength.style.background = colors[Math.floor(score / 26)] || colors[3];
    strength.style.boxShadow = `0 0 8px ${strength.style.background}`;
  });

  // Toggle password
  document.getElementById('toggle-pass').addEventListener('click', () => {
    passInput.type = passInput.type === 'password' ? 'text' : 'password';
  });

  // Login
  const btn = document.getElementById('login-btn');
  const btnText = document.getElementById('btn-text');
  const errorMsg = document.getElementById('error-msg');
  const success = document.getElementById('success');

  btn.addEventListener('click', () => {
    errorMsg.classList.remove('show');
    btn.classList.add('loading');
    btnText.textContent = 'VERIFICANDO...';

    setTimeout(() => {
      btn.classList.remove('loading');
      const user = document.getElementById('user').value;
      const pass = passInput.value;

      if (user && pass.length >= 4) {
        btnText.textContent = 'ACCESO CONCEDIDO';
        success.classList.add('show');
        setTimeout(() => {
          success.classList.remove('show');
          btnText.textContent = 'INICIAR SESIÓN';
        }, 3000);
      } else {
        btnText.textContent = 'INICIAR SESIÓN';
        errorMsg.classList.add('show');
        document.querySelector('.card').style.animation = 'none';
        document.querySelector('.card').style.borderColor = 'rgba(255,107,107,0.4)';
        setTimeout(() => {
          document.querySelector('.card').style.borderColor = 'rgba(0,245,212,0.25)';
          errorMsg.classList.remove('show');
        }, 2000);
      }
    }, 1800);
  });

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') btn.click();
  });
</script>
</body>
</html>
